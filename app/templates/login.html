<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Pokemon Card Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-ball-lg">&#9711;</span>
      <h1>Pokemon Card Catalog</h1>
    </div>
    <p class="auth-subtitle">Enter your email to receive a login code.</p>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
      <input type="email" name="email" placeholder="your@email.com"
             class="form-input" required autofocus autocomplete="email" />
      <button type="submit" class="btn btn-primary btn-full">Send Login Code</button>
    </form>
  </div>
</body>
</html>
